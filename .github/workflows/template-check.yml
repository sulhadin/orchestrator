name: Template Sync Check

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  check-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check template sync
        run: |
          FAILED=0

          # Check roles
          for f in .orchestra/roles/*.md; do
            name=$(basename "$f")
            if [ -f "template/.orchestra/roles/$name" ]; then
              if ! diff -q "$f" "template/.orchestra/roles/$name" > /dev/null 2>&1; then
                echo "❌ DESYNC: .orchestra/roles/$name differs from template"
                FAILED=1
              fi
            else
              echo "❌ MISSING: template/.orchestra/roles/$name"
              FAILED=1
            fi
          done

          # Check rules
          for f in .claude/rules/*.orchestra.md; do
            name=$(basename "$f")
            if [ -f "template/.claude/rules/$name" ]; then
              if ! diff -q "$f" "template/.claude/rules/$name" > /dev/null 2>&1; then
                echo "❌ DESYNC: .claude/rules/$name differs from template"
                FAILED=1
              fi
            else
              echo "❌ MISSING: template/.claude/rules/$name"
              FAILED=1
            fi
          done

          # Check skills
          for f in .claude/skills/*.orchestra.md; do
            name=$(basename "$f")
            if [ -f "template/.claude/skills/$name" ]; then
              if ! diff -q "$f" "template/.claude/skills/$name" > /dev/null 2>&1; then
                echo "❌ DESYNC: .claude/skills/$name differs from template"
                FAILED=1
              fi
            else
              echo "❌ MISSING: template/.claude/skills/$name"
              FAILED=1
            fi
          done

          # Check commands
          for f in .claude/commands/orchestra/*.md; do
            name=$(basename "$f")
            if [ -f "template/.claude/commands/orchestra/$name" ]; then
              if ! diff -q "$f" "template/.claude/commands/orchestra/$name" > /dev/null 2>&1; then
                echo "❌ DESYNC: .claude/commands/orchestra/$name differs from template"
                FAILED=1
              fi
            else
              echo "❌ MISSING: template/.claude/commands/orchestra/$name"
              FAILED=1
            fi
          done

          # Check agents (only real files, not symlinks)
          for f in .claude/agents/conductor.md .claude/agents/reviewer.md; do
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              name=$(basename "$f")
              if [ -f "template/.claude/agents/$name" ]; then
                if ! diff -q "$f" "template/.claude/agents/$name" > /dev/null 2>&1; then
                  echo "❌ DESYNC: .claude/agents/$name differs from template"
                  FAILED=1
                fi
              else
                echo "❌ MISSING: template/.claude/agents/$name"
                FAILED=1
              fi
            fi
          done

          # Check single files
          for pair in "CLAUDE.md:CLAUDE.md" ".orchestra/README.md:.orchestra/README.md" ".orchestra/config.yml:.orchestra/config.yml"; do
            src="${pair%%:*}"
            tgt="template/${pair##*:}"
            if ! diff -q "$src" "$tgt" > /dev/null 2>&1; then
              echo "❌ DESYNC: $src differs from template"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 0 ]; then
            echo "✅ Template is in sync"
          else
            echo ""
            echo "Template is out of sync. Run: cp <source> template/<source> for each file above."
            exit 1
          fi
