name: Release & Publish

on:
  push:
    branches: [main, next]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release config
        if: github.ref_name == 'next'
        run: |
          node --input-type=module -e "
            import { readFileSync, writeFileSync } from 'fs';
            const cfg = JSON.parse(readFileSync('release-please-config.json', 'utf8'));
            cfg.versioning = 'prerelease';
            cfg.prerelease = true;
            cfg['prerelease-type'] = 'beta';
            writeFileSync('release-please-config.json', JSON.stringify(cfg, null, 2) + '\n');
          "

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.ref_name }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build template
        run: yarn run template

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          if echo "$VERSION" | grep -q "beta\|alpha\|rc"; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
          echo "Publishing v${VERSION} with tag: $(cat $GITHUB_OUTPUT | grep tag | cut -d= -f2)"

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.npm-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
